faq:
  title: Частозадаваемые вопросы
  items:
    - question: Консультации конфиденциальны?
      answer: >
        Да, все консультации строго конфиденциальны. Содержание разговоров не
        разглашается. Это один из базовых принципов работы психолога и важное
        условие доверия между специалистом и клиентом.
    - question: Как сотрудники записываются?
      answer: >
        Запись организуется через HR или напрямую по согласованию с компанией.
        Можно настроить удобный канал: форма, календарь, корпоративный мессенджер.
        Я подстраиваюсь под процессы, которые уже есть у вас.
    - question: Сколько сотрудников могут пользоваться пакетом?
      answer: >
        Зависит от выбранного формата и пакета. Обычно мы обсуждаем это на
        этапе диагностики и подбираем вариант под размер команды и задачи.
        Ограничения по числу участников оговариваются в договоре.
    - question: Можно ли сначала протестировать формат?
      answer: >
        Да. Часто мы начинаем с пилотного проекта или серии встреч для части
        команды, чтобы оценить запрос и формат. После этого можно масштабировать
        сотрудничество на всю команду или другие подразделения.
