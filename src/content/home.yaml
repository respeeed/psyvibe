whyTrust:
  title: Почему компании доверяют мне
  body: >-
    Я работаю на стыке психологии и бизнеса. До психологической практики я почти
    10 лет работала внутри компаний: 5 лет в крупной федеральной корпорации, 5
    лет в стартапах и удалённых командах


    Этот опыт позволяет мне понимать не только эмоциональное состояние
    сотрудников, но и реальные бизнес-процессы внутри компаний. Я использую
    методы когнитивно-поведенческой терапии и современные практики работы со
    стрессом и выгоранием.
  tags:
    - Название тега
  image: whyTrust/image.png
  video: videos/01.mp4
process:
  title: Внутренние процессы в команде напрямую влияют на прибыль бизнеса
  subtitle: 'Компании чаще всего сталкиваются с такими ситуациями:'
  topicTags:
    - растёт текучка кадров
    - сотрудники выгорают и теряют мотивацию
    - возникают конфликты внутри команды
    - новые сотрудники не проходят адаптацию и уходят в первые месяцы
    - возникают конфликты внутри команды
    - руководители перегружены и эмоционально выгорают
    - падает вовлечённость и инициативность сотрудников
  body: >-
    Каждая из этих проблем приводит к прямым потерям бизнеса:

    затраты на найм, потеря экспертизы, падение производительности и замедление
    роста компании.
  cardTitle: >-
    Корпоративная психологическая поддержка помогает предотвращать эти процессы
    и сохранять устойчивость команды.
benefits:
  title: Почему бизнесу выгоден корпоративный психолог
  body: "Проблемы внутри команды напрямую влияют на финансовые результаты компании. В среднем компания тратит от 2 до 6 месячных зарплат, чтобы заменить одного сотрудника.\LЕсли сотрудник увольняется через 3–6 месяцев, компания теряет сотни тысяч рублей. Работа корпоративного психолога помогает:"
  listItems:
    - снижать текучку кадров
    - быстрее адаптировать новых сотрудников
    - снижать уровень выгорания
    - оддерживать руководителей
  image: benefits/image.png
  video: videos/03.mp4
