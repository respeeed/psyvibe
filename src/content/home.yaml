whyTrust:
  title: Почему компании доверяют мне
  body: >
    Я забочусь о результатах и бизнесе. Даю системный взгляд на бизнес-процессы
    и командную работу.


    Мой опыт позволяет увидеть и проработать глубокие проблемы, из-за которых
    бизнес теряет деньги.


    В компании всегда появляется конкретный запрос к специалисту. После работы
    это система в действии.
